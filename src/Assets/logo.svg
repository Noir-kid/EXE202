<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <path id="topArc" d="M 28,120 A 92,92 0 0,1 212,120"/>
    <path id="botArc" d="M 38,135 A 86,86 0 0,0 202,135"/>
  </defs>

  <!-- Outer ring -->
  <circle cx="120" cy="120" r="119" fill="#1a3055"/>
  <circle cx="120" cy="120" r="108" fill="white"/>
  <circle cx="120" cy="120" r="100" fill="white"/>

  <!-- SportSG text - top arc -->
  <text font-family="'Arial Black','Impact',sans-serif" font-weight="900" font-size="26" fill="#1a3055" letter-spacing="2">
    <textPath href="#topArc" startOffset="16%">SportSG</textPath>
  </text>

  <!-- BOOKING SPORTS VENUES text - bottom arc -->
  <text font-family="Arial,sans-serif" font-weight="700" font-size="10.5" fill="#1a3055" letter-spacing="1.8">
    <textPath href="#botArc" startOffset="4%">BOOKING SPORTS VENUES</textPath>
  </text>

  <!-- Orange swoosh ribbon -->
  <path d="M 72,148 Q 90,95 155,108 Q 148,155 98,168 Z" fill="#f97316" opacity="0.92"/>

  <!-- Blue location pin -->
  <path d="M 120,52 C 97,52 78,71 78,94 C 78,123 120,158 120,158 C 120,158 162,123 162,94 C 162,71 143,52 120,52 Z" fill="#0ea5e9"/>

  <!-- Pin highlight -->
  <path d="M 120,52 C 97,52 78,71 78,94 C 78,104 82,116 88,126 L 120,52 Z" fill="#38bdf8" opacity="0.4"/>

  <!-- White circle in pin -->
  <circle cx="120" cy="93" r="23" fill="white"/>

  <!-- Soccer ball in pin center -->
  <circle cx="120" cy="93" r="17" fill="#1a3055"/>
  <circle cx="120" cy="93" r="13" fill="white"/>
  <circle cx="120" cy="93" r="9" fill="#1a3055"/>
  <!-- Ball seam lines -->
  <path d="M 111,85 Q 120,93 111,101" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <path d="M 129,85 Q 120,93 129,101" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Badminton racket (left) -->
  <ellipse cx="76" cy="108" rx="13" ry="13" fill="none" stroke="#0ea5e9" stroke-width="3"/>
  <line x1="76" y1="121" x2="71" y2="138" stroke="#0ea5e9" stroke-width="3" stroke-linecap="round"/>
  <line x1="64" y1="108" x2="88" y2="108" stroke="#0ea5e9" stroke-width="1.5" opacity="0.6"/>
  <line x1="76" y1="96" x2="76" y2="121" stroke="#0ea5e9" stroke-width="1.5" opacity="0.6"/>
  <line x1="68" y1="100" x2="84" y2="116" stroke="#0ea5e9" stroke-width="1" opacity="0.4"/>
  <line x1="84" y1="100" x2="68" y2="116" stroke="#0ea5e9" stroke-width="1" opacity="0.4"/>

  <!-- Shuttlecock (right top) -->
  <circle cx="163" cy="88" r="7" fill="#f97316"/>
  <path d="M 163,81 L 157,68" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 163,81 L 163,66" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 163,81 L 169,68" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 157,68 Q 163,65 169,68" fill="none" stroke="white" stroke-width="1.5"/>

  <!-- Tennis ball (bottom right) -->
  <circle cx="158" cy="130" r="10" fill="#f97316" opacity="0.9"/>
  <path d="M 150,124 Q 158,130 150,136" fill="none" stroke="white" stroke-width="2"/>
  <path d="M 166,124 Q 158,130 166,136" fill="none" stroke="white" stroke-width="2"/>

  <!-- Court lines at bottom (badminton court) -->
  <g stroke="#0ea5e9" stroke-width="1.5" fill="none" opacity="0.5">
    <line x1="82" y1="150" x2="158" y2="150"/>
    <line x1="87" y1="160" x2="153" y2="160"/>
    <line x1="120" y1="144" x2="120" y2="168"/>
  </g>
</svg>
