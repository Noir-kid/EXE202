services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sportsg_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "SportSG@2026"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./sql:/sql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "SportSG@2026", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sportsg_db_init
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./sql:/sql
    entrypoint: >
      /bin/bash -c "
        echo 'Running demo-data.sql...';
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P SportSG@2026 -C -i /sql/demo-data.sql;
        echo 'Done!';
      "
    restart: "no"

volumes:
  sqlserver_data:
